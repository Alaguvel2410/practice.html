<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Account Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            padding: 30px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        table {
            width: 65%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: #ffffff;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }
        th {
            background-color: #2980b9;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #d6eaf8;
        }
    </style>
</head>
<body>
    <h2>Bank Account Details</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Account Type</th>
            <th>Balance</th>
        </tr>
        <tr>
            <td>Alaguvel</td>
            <td>Savings</td>
            <td>5000</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>Current</td>
            <td>12000</td>
        </tr>
        <tr>
            <td>Priya</td>
            <td>Savings</td>
            <td>8500</td>
        </tr>
        <tr>
            <td>Karthik</td>
            <td>Current</td>
            <td>3000</td>
        </tr>
    </table>
</body>
</html>
