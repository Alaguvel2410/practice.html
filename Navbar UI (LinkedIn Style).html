<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        .overall {
            display: flex;
            justify-content: space-evenly;
            padding: 15px;
            background-color: #f4f4f4;
        }
        .ic {
            display: grid;
            justify-items: center;
            row-gap: 5px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .ic img {
            width: 24px;
            height: 24px;
        }
        .ic p {
            text-align: center;
        }
        .ic:hover {
            background-color: #e0e0e0;
        }
        .active {
            color: #0a66c2;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="overall">
        <div class="ic active">
            <img src="img/home-alt.png" alt="">
            <p>Home</p>
        </div>
        <div class="ic">
            <img src="img/group.png" alt="">
            <p>My<br>Network</p>
        </div>
        <div class="ic">
            <img src="img/briefcase.png" alt=""> 
            <p>Jobs</p>
        </div>
        <div class="ic">
            <img src="img/message-box.png" alt="">
            <p>Messaging</p>
        </div>
        <div class="ic">
            <img src="img/bell.png" alt="">
            <p>Notifications</p>
        </div>
        <div class="ic">
            <img src="img/apps.png" alt="">
            <p>For Business</p>
        </div>
    </div>
</body>
</html>
