<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        h2 { color: #333; margin: 0 0 8px; }
        p  { color: #666; margin: 0 0 16px; }
        .badge {
            background: #ecfdf5;
            color: #10b981;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">A</div>
        <h2>Alaguvel A</h2>
        <p>Python Full Stack Student</p>
        <span class="badge">🐍 Python Developer</span>
    </div>
</body>
</html>
